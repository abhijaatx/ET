services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/myet
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GNEWS_KEY=${GNEWS_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - PORT=3001
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - postgres
      - redis
    command: ["sh", "-c", "npm run db:migrate --workspace apps/api && npm run start --workspace apps/api"]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["sh", "-c", "npx tsx apps/api/src/workers/ingest.ts"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/myet
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GNEWS_KEY=${GNEWS_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - postgres
      - redis
      - api
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npm run start --workspace apps/web"]

volumes:
  pgdata:
